#-------------------------------------------------------------------------------
# Build & Test for pushes and pull requests on the main branch.
# (In theory only pull requests should happen on the main branch.)
# Run all unit tests and integration tests.
#-------------------------------------------------------------------------------
name: Main Branch Build & Test

#-------------------------------------------------------------------------------
# Triggers
#-------------------------------------------------------------------------------
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

#-------------------------------------------------------------------------------
# Environments
#-------------------------------------------------------------------------------
env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: "Release"

jobs:
  build-test:
    #--------------------------------------------------------------------------
    # Runs on
    #--------------------------------------------------------------------------
    runs-on: ubuntu-latest

    services:
      #-------------------------------------------------------------------------------
      # Setup PostgreSQL
      #-------------------------------------------------------------------------------
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
    #--------------------------------------------------------------------------    
    # Diagnostics
    #--------------------------------------------------------------------------
    - name: Show GitHub Context
      run: |
        echo "Workflow      : ${{ github.workflow }}"
        echo "Event         : ${{ github.event_name }}"
        echo "Repository    : ${{ github.repository }}"
        echo "Branch        : ${{ github.ref_name }}"
        echo "SHA           : ${{ github.sha }}"
        echo "Actor         : ${{ github.actor }}"
        echo "Triggered By  : ${{ github.triggering_actor }}"
        echo "Run Number    : ${{ github.run_number }}"
        echo "Run Attempt   : ${{ github.run_attempt }}"
        echo "Runner        : ${{ runner.os }}"
        echo "Workspace     : ${{ github.workspace }}"
    #--------------------------------------------------------------------------    
    # Checkout
    #--------------------------------------------------------------------------
    - name: Checkout Source
      uses: actions/checkout@v4
    #--------------------------------------------------------------------------    
    # Setup
    #--------------------------------------------------------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{env.DOTNET_VERSION}}
    - name: Display .NET Information
      run: dotnet --info
    #--------------------------------------------------------------------------    
    # Restore
    #--------------------------------------------------------------------------
    - name: Restore dependencies
      run: dotnet restore
    #--------------------------------------------------------------------------    
    # Build
    #--------------------------------------------------------------------------
    - name: Build
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
    #--------------------------------------------------------------------------
    # Unit Tests
    #--------------------------------------------------------------------------
    - name: Run unit tests
      shell: bash
      run: |
        find . -name "*.UnitTest.csproj" -print0 | while IFS= read -r -d '' project
        do
          echo "Running unit test $project"
          dotnet test "$project" --configuration ${{ env.CONFIGURATION }} --no-build --logger trx
        done
    #--------------------------------------------------------------------------
    # Integration Tests 
    # (Backing services like DB/Telemetry/etc. are setup in the service section)
    #--------------------------------------------------------------------------
    - name: Run Integration Test
      shell: bash
      run: |
        find . -name "*.IntegrationTest.csproj" -print0 | while IFS= read -r -d '' project
        do
          echo "Running integration test $project"
          dotnet test "$project" --configuration ${{ env.CONFIGURATION }} --no-build --logger trx
        done 
